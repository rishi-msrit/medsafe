[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --no-header
    -p no:warnings
    --color=yes
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    requires_model: marks tests that need a trained checkpoint
    requires_data: marks tests that need processed dataset files
